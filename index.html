<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma Calls 📹</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #2e2e2e;
  --accent: #5865f2;
  --red: #ed4245;
  --green: #57f287;
  --yellow: #faa61a;
  --text: #e0e0e0;
  --muted: #888;
  --radius: 8px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── LOBBY ── */
#lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding: 32px 20px;
  width: 100%;
  max-width: 400px;
  animation: fadeIn .3s ease;
}

.site-title {
  font-size: 1.8rem;
  font-weight: 700;
  color: #fff;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card label {
  font-size: .8rem;
  color: var(--muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .05em;
}

input[type="text"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: .9rem;
  padding: 10px 14px;
  outline: none;
  width: 100%;
  transition: border-color .15s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted); }

.btn {
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: inherit;
  font-size: .9rem;
  font-weight: 600;
  padding: 10px 18px;
  transition: opacity .15s, transform .1s;
  width: 100%;
}
.btn:hover { opacity: .85; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }

.btn-primary { background: var(--accent); color: #fff; }
.btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

hr { border: none; border-top: 1px solid var(--border); }

.notice {
  background: rgba(250,166,26,.08);
  border: 1px solid rgba(250,166,26,.25);
  border-radius: var(--radius);
  color: var(--yellow);
  font-size: .78rem;
  line-height: 1.6;
  padding: 10px 14px;
  text-align: center;
  width: 100%;
}
.notice a { color: inherit; }

/* ── ROOM ── */
#room {
  display: none;
  width: 100vw;
  height: 100vh;
  flex-direction: column;
  background: var(--bg);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-title { font-weight: 700; color: #fff; font-size: 1rem; }
.badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  font-size: .72rem;
  padding: 3px 8px;
  font-family: monospace;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.topbar-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  font-size: .8rem;
  font-weight: 600;
  padding: 6px 12px;
  transition: background .15s;
}
.topbar-btn:hover { background: #2e2e2e; }

.room-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.video-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 12px;
  overflow: hidden;
}

.video-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 180px;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#local-video { transform: scaleX(-1); }

.tile-label {
  position: absolute;
  bottom: 8px; left: 8px;
  background: rgba(0,0,0,.6);
  border-radius: 4px;
  color: #fff;
  font-size: .72rem;
  font-weight: 600;
  padding: 2px 8px;
}
.tile-muted-badge {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(237,66,69,.85);
  border-radius: 4px;
  color: #fff;
  font-size: .7rem;
  padding: 2px 6px;
  display: none;
}

.avatar-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: .85rem;
}
.avatar-circle {
  width: 60px; height: 60px;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 0 2px;
}

.ctrl {
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  font-family: inherit;
  font-size: .7rem;
  font-weight: 500;
  gap: 4px;
  padding: 10px 16px;
  transition: background .15s, border-color .15s, color .15s;
  min-width: 68px;
}
.ctrl:hover { background: var(--surface2); }
.ctrl.off { background: rgba(237,66,69,.15); border-color: rgba(237,66,69,.45); color: var(--red); }
.ctrl .icon { font-size: 1.2rem; }
.ctrl.leave { background: var(--red); border-color: var(--red); color: #fff; }
.ctrl.leave:hover { opacity: .85; }

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: .85rem;
  font-weight: 600;
}
.participant-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.participant {
  align-items: center;
  border-radius: 6px;
  display: flex;
  gap: 8px;
  padding: 8px 10px;
}
.participant:hover { background: var(--surface2); }
.p-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}
.p-dot.muted-dot { background: var(--red); }
.p-name { flex: 1; font-size: .85rem; font-weight: 500; }
.p-crown { font-size: .7rem; color: var(--yellow); }
.p-actions { display: flex; gap: 4px; }
.p-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  cursor: pointer;
  font-size: .68rem;
  padding: 2px 6px;
  transition: all .15s;
  font-family: inherit;
}
.p-btn:hover { border-color: var(--text); color: var(--text); }
.p-btn.kick-btn:hover { background: rgba(237,66,69,.15); border-color: var(--red); color: var(--red); }

.host-panel {
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  display: none;
}
.host-panel-title {
  color: var(--muted);
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .05em;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.host-note { color: var(--muted); font-size: .75rem; line-height: 1.5; }

#status-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-size: .75rem;
  padding: 6px 16px;
  text-align: center;
  flex-shrink: 0;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- ═══ LOBBY ═══ -->
<div id="lobby">
  <div class="site-title">Ligma Calls 📹</div>



  <div class="card">
    <label>Your Name</label>
    <input type="text" id="username-input" placeholder="Enter your name…" maxlength="24" />

    <hr>

    <label>Start a new call</label>
    <button class="btn btn-primary" id="start-btn">📹 Start Call</button>

    <hr>

    <label>Join existing call</label>
    <input type="text" id="call-id-input" placeholder="Paste Call ID…" />
    <button class="btn btn-ghost" id="join-btn">→ Join</button>
  </div>
</div>

<!-- ═══ ROOM ═══ -->
<div id="room">

  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">Ligma Calls 📹</span>
      <span class="badge" id="call-id-display"></span>
    </div>
    <button class="topbar-btn" id="copy-btn">📋 Copy ID</button>
  </div>

  <div class="room-body">

    <div class="video-area">
      <div class="video-grid" id="video-grid">

        <div class="tile">
          <video id="local-video" autoplay muted playsinline></video>
          <div class="tile-label" id="local-label">You</div>
        </div>

        <div class="tile">
          <div class="avatar-placeholder" id="remote-placeholder">
            <div class="avatar-circle">👤</div>
            <span>Waiting for someone…</span>
          </div>
          <video id="remote-video" autoplay playsinline style="display:none"></video>
          <div class="tile-label" id="remote-label">Remote</div>
          <div class="tile-muted-badge" id="remote-muted-badge">🔇 Muted by host</div>
        </div>

      </div>

      <div class="controls">
        <button class="ctrl" id="mic-btn">
          <span class="icon" id="mic-icon">🎙️</span>
          <span id="mic-label">Mute</span>
        </button>
        <button class="ctrl" id="cam-btn">
          <span class="icon" id="cam-icon">📹</span>
          <span id="cam-label">Stop Video</span>
        </button>
        <button class="ctrl leave" id="leave-btn">
          <span class="icon">📵</span>
          <span>Leave</span>
        </button>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">👥 Participants (<span id="p-count">1</span>)</div>
      <div class="participant-list" id="participant-list"></div>
      <div class="host-panel" id="host-panel">
        <div class="host-panel-title">👑 Host Controls</div>
        <div class="host-note">Use 🔇/🔊 to mute and 🚪 to kick participants.</div>
      </div>
    </div>

  </div>

  <div id="status-bar">Connecting…</div>
</div>

<script type="module">
import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getDatabase, ref, set, get, update, push, onValue, onChildAdded, off, remove }
                                                   from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBjxcjNT43FG6v6np0PsfnlCKay1V-53zI",
  authDomain:        "ligma-calls.firebaseapp.com",
  databaseURL:       "https://ligma-calls-default-rtdb.firebaseio.com",
  projectId:         "ligma-calls",
  storageBucket:     "ligma-calls.firebasestorage.app",
  messagingSenderId: "212658903870",
  appId:             "1:212658903870:web:d5970c99eeb1e195d16a6f"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const ICE = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302','stun:stun2.l.google.com:19302'] }] };

let localStream         = null;
let pc                  = null;
let callId              = null;
let isHost              = false;
let myName              = 'You';
let remoteName          = 'Remote';
let myMicOn             = true;
let myCamOn             = true;
let listeners           = []; // { ref, event, cb } — so we can detach all on hang up
let remoteActuallyMuted = false;

const $         = id => document.getElementById(id);
const setStatus = t  => $('status-bar').textContent = t;

// ── RTDB helpers ─────────────────────────────────────────────────────────────
function dbRef(path)          { return ref(db, path); }
function dbSet(path, val)     { return set(dbRef(path), val); }
function dbUpdate(path, val)  { return update(dbRef(path), val); }
function dbGet(path)          { return get(dbRef(path)); }
function dbPush(path, val)    { return push(dbRef(path), val); }

// Subscribe and remember the listener so we can detach it on hang-up
function dbOn(path, event, cb) {
  const r = dbRef(path);
  onValue(r, cb);   // onValue covers 'value'; onChildAdded used separately
  listeners.push({ r, event, cb });
  return r;
}
function dbOnChild(path, cb) {
  const r = dbRef(path);
  onChildAdded(r, cb);
  listeners.push({ r, event: 'child_added', cb });
  return r;
}
function detachAll() {
  listeners.forEach(({ r }) => off(r));
  listeners = [];
}

// ── MEDIA ─────────────────────────────────────────────────────────────────────
async function getMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    $('local-video').srcObject = localStream;
    return true;
  } catch {
    alert('Camera/mic access denied. Please allow permissions and reload.');
    return false;
  }
}

// ── PEER CONNECTION ───────────────────────────────────────────────────────────
function initPC() {
  pc = new RTCPeerConnection(ICE);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = e => {
    $('remote-video').srcObject     = e.streams[0];
    $('remote-video').style.display = 'block';
    $('remote-placeholder').style.display = 'none';
  };
}

function showRoom(id) {
  $('lobby').style.display        = 'none';
  $('room').style.display         = 'flex';
  $('call-id-display').textContent = id;
  $('local-label').textContent    = myName + (isHost ? ' 👑' : '');
}

function renderParticipants(hasGuest) {
  const list = $('participant-list');
  list.innerHTML = '';
  let count = 0;

  const entries = [
    { name: myName,    host: isHost,  muted: !myMicOn,             self: true  },
    ...(hasGuest ? [{ name: remoteName, host: !isHost, muted: remoteActuallyMuted, self: false }] : [])
  ];

  entries.forEach(p => {
    count++;
    const row = document.createElement('div');
    row.className = 'participant';
    let actions = '';
    if (isHost && !p.self) {
      const muteLabel = p.muted ? '🔊 Unmute' : '🔇 Mute';
      actions = `<div class="p-actions">
        <button class="p-btn" data-action="mute">${muteLabel}</button>
        <button class="p-btn kick-btn" data-action="kick">🚪 Kick</button>
      </div>`;
    }
    row.innerHTML = `
      <div class="p-dot ${p.muted ? 'muted-dot' : ''}"></div>
      <span class="p-name">${p.name}</span>
      ${p.host ? '<span class="p-crown">👑</span>' : ''}
      ${actions}`;
    list.appendChild(row);
  });

  $('p-count').textContent = count;
  if (isHost) $('host-panel').style.display = 'block';
}

// ── WIRE BUTTONS ─────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click',  () => startCall());
document.getElementById('join-btn').addEventListener('click',   () => joinCall());
document.getElementById('copy-btn').addEventListener('click',   () => copyCallId());
document.getElementById('mic-btn').addEventListener('click',    () => toggleMic());
document.getElementById('cam-btn').addEventListener('click',    () => toggleCam());
document.getElementById('leave-btn').addEventListener('click',  () => hangUp());
document.getElementById('participant-list').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  if (btn.dataset.action === 'mute') hostToggleMute();
  if (btn.dataset.action === 'kick') hostKick();
});

// ── START CALL (host) ─────────────────────────────────────────────────────────
async function startCall() {
  myName = $('username-input').value.trim() || 'Host';
  if (!await getMedia()) return;
  isHost = true;
  initPC();

  // Generate a short random call ID
  callId = Math.random().toString(36).slice(2, 8).toUpperCase();
  const base = `calls/${callId}`;

  // Collect host ICE candidates and push to RTDB
  pc.onicecandidate = e => {
    if (e.candidate) dbPush(`${base}/hostCandidates`, e.candidate.toJSON());
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await dbSet(base, {
    offer:       { type: offer.type, sdp: offer.sdp },
    hostName:    myName,
    guestName:   '',
    hostMuted:   false,
    guestMuted:  false,
    guestKicked: false
  });

  showRoom(callId);
  setStatus('Waiting for someone to join…');
  renderParticipants(false);

  // Watch for answer + control flags
  dbOn(base, 'value', async snap => {
    const d = snap.val();
    if (!d) return;

    if (!pc.currentRemoteDescription && d.answer) {
      await pc.setRemoteDescription(new RTCSessionDescription(d.answer));
      remoteName = d.guestName || 'Guest';
      $('remote-label').textContent = remoteName;
      setStatus('Connected ✓');
    }

    remoteActuallyMuted = d.guestMuted ?? false;
    $('remote-muted-badge').style.display = remoteActuallyMuted ? 'block' : 'none';
    renderParticipants(!!d.answer);
  });

  // Stream guest ICE candidates into PC as they arrive
  dbOnChild(`${base}/guestCandidates`, snap => {
    pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(() => {});
  });
}

// ── JOIN CALL (guest) ─────────────────────────────────────────────────────────
async function joinCall() {
  const id = $('call-id-input').value.trim().toUpperCase();
  myName   = $('username-input').value.trim() || 'Guest';
  if (!id) { alert('Paste a Call ID first!'); return; }
  if (!await getMedia()) return;
  isHost = false;
  initPC();

  callId = id;
  const base = `calls/${callId}`;

  const snap = await dbGet(base);
  if (!snap.exists()) { alert('Call not found!'); return; }

  const data = snap.val();
  remoteName = data.hostName || 'Host';
  $('remote-label').textContent = remoteName;

  // Collect guest ICE candidates
  pc.onicecandidate = e => {
    if (e.candidate) dbPush(`${base}/guestCandidates`, e.candidate.toJSON());
  };

  await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await dbUpdate(base, { answer: { type: answer.type, sdp: answer.sdp }, guestName: myName });

  showRoom(id);
  setStatus('Connected ✓');
  renderParticipants(true);

  // Watch for host commands (mute/kick) and mute-state changes
  dbOn(base, 'value', snap => {
    if (!snap.exists()) { alert('Call ended.'); hangUp(); return; }
    const d = snap.val();

    if (d.guestKicked) { alert('You were kicked by the host.'); hangUp(); return; }

    // Apply host-initiated mute
    const shouldBeMuted = d.guestMuted ?? false;
    const track = localStream?.getAudioTracks()[0];
    if (track && track.enabled === shouldBeMuted) {
      track.enabled = !shouldBeMuted;
      myMicOn = !shouldBeMuted;
      $('mic-btn').classList.toggle('off', !myMicOn);
      $('mic-icon').textContent  = myMicOn ? '🎙️' : '🔇';
      $('mic-label').textContent = myMicOn ? 'Mute' : 'Unmute';
      if (shouldBeMuted) alert('You were muted by the host.');
    }

    remoteActuallyMuted = d.hostMuted ?? false;
    $('remote-muted-badge').style.display = remoteActuallyMuted ? 'block' : 'none';
    renderParticipants(true);
  });

  // Stream host ICE candidates into PC
  dbOnChild(`${base}/hostCandidates`, snap => {
    pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(() => {});
  });
}

// ── MY CONTROLS ───────────────────────────────────────────────────────────────
async function toggleMic() {
  const track = localStream?.getAudioTracks()[0];
  if (!track) return;
  myMicOn = !myMicOn;
  track.enabled = myMicOn;
  $('mic-btn').classList.toggle('off', !myMicOn);
  $('mic-icon').textContent  = myMicOn ? '🎙️' : '🔇';
  $('mic-label').textContent = myMicOn ? 'Mute' : 'Unmute';
  if (callId) {
    const field = isHost ? 'hostMuted' : 'guestMuted';
    await dbUpdate(`calls/${callId}`, { [field]: !myMicOn }).catch(() => {});
  }
}

function toggleCam() {
  const track = localStream?.getVideoTracks()[0];
  if (!track) return;
  myCamOn = !myCamOn;
  track.enabled = myCamOn;
  $('cam-btn').classList.toggle('off', !myCamOn);
  $('cam-icon').textContent  = myCamOn ? '📹' : '📷';
  $('cam-label').textContent = myCamOn ? 'Stop Video' : 'Start Video';
}

function hangUp() {
  pc?.close();
  localStream?.getTracks().forEach(t => t.stop());
  detachAll();
  // Clean up call data from RTDB if host
  if (isHost && callId) remove(dbRef(`calls/${callId}`)).catch(() => {});
  $('room').style.display             = 'none';
  $('lobby').style.display            = 'flex';
  $('local-video').srcObject          = null;
  $('remote-video').srcObject         = null;
  $('remote-video').style.display     = 'none';
  $('remote-placeholder').style.display = 'flex';
  pc = null; localStream = null; isHost = false; callId = null;
  setStatus('Connecting…');
}

function copyCallId() {
  navigator.clipboard.writeText($('call-id-display').textContent);
  $('copy-btn').textContent = '✓ Copied!';
  setTimeout(() => { $('copy-btn').textContent = '📋 Copy ID'; }, 1800);
}

// ── HOST COMMANDS ─────────────────────────────────────────────────────────────
async function hostToggleMute() {
  if (!isHost || !callId) return;
  const snap = await dbGet(`calls/${callId}`);
  const cur  = snap.val()?.guestMuted ?? false;
  await dbUpdate(`calls/${callId}`, { guestMuted: !cur });
}

async function hostKick() {
  if (!isHost || !callId) return;
  if (!confirm('Kick this participant from the call?')) return;
  await dbUpdate(`calls/${callId}`, { guestKicked: true });
}
</script>
